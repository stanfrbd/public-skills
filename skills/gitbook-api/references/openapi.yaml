        - site-sections
      security:
        - user: []
        - oauth:
            - site:write
      parameters:
        - $ref: "#/components/parameters/organizationId"
        - $ref: "#/components/parameters/siteId"
        - $ref: "#/components/parameters/siteSectionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  $ref: "#/components/schemas/SiteSectionTitle"
