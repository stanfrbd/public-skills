        - type: object
          properties:
            type:
              type: string
              enum:
                - builtin:discord
            setupSettings:
              type: object
              additionalProperties: false
              properties:
                allowedChannels:
                  description: List of allowed Discord channel names or patterns. If empty, all channels are allowed.
