    SiteFindingStatus:
      type: string
      description: |
        Status of a site finding.
          - `candidate` is a finding that has been raised but not yet confirmed. Typically these are not shown to users.
          - `open` is a finding that has been surfaced to users and is still under investigation.
          - `done` is a finding that has been resolved and is no longer under investigation.
          - `canceled` is a finding that has been canceled and is no longer under investigation.
      enum:
        - candidate
        - open
        - done
        - canceled
    SiteFindingType:
      type: string
      description: |-
        Classification of a site finding:
          - Outdated content: The content is no longer up to date with external context and may be misleading or incorrect.
          - Incoherent content: The content contains information that is inconsistent or contradictory.
          - Content gap: The content is missing important information that should be present to answer user questions effectively.
          - Other: Any other type of finding not covered by the above categories.
      enum:
        - content-outdated
        - incoherence
        - content-gap
        - other
    SiteFindingSeverity:
      type: string
      description: Estimated end-user severity of a site finding.
      enum:
        - low
        - medium
        - high
    SiteFindingTitle:
      type: string
      description: Short finding title
      maxLength: 256
    SiteFinding:
      type: object
      properties:
        object:
          type: string
          enum:
            - site-finding
        id:
          type: string
          description: The ID of the finding
        scan:
          type: string
          description: The site scan ID associated with the finding
        topic:
          type: string
          description: The site topic ID associated with the finding
        title:
          $ref: "#/components/schemas/SiteFindingTitle"
        changeRequests:
          type: number
          description: Number of change requests linked to the finding
        pages:
          type: number
          description: Number of pages linked to the finding
        records:
          type: number
          description: Number of records linked to the finding
        questions:
          type: number
          description: Number of questions linked to the finding
        status:
          $ref: "#/components/schemas/SiteFindingStatus"
        type:
          $ref: "#/components/schemas/SiteFindingType"
        severity:
          $ref: "#/components/schemas/SiteFindingSeverity"
        description:
          $ref: "#/components/schemas/JSONDocument"
        autoFixable:
          type: boolean
          description: Whether an AI agent should be able to fix this finding directly
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
        urls:
          type: object
          description: URLs associated with the finding
          properties:
            location:
              type: string
              description: URL of the finding list endpoint in the API
              format: uri
          required:
            - location
      required:
        - object
        - id
        - scan
        - topic
        - title
        - changeRequests
        - pages
        - records
        - questions
        - status
        - type
        - severity
        - description
        - autoFixable
        - createdAt
        - updatedAt
        - urls
