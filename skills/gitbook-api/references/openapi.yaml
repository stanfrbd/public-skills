          $ref: "#/components/schemas/AIMessageTask"
      required:
        - type
        - messageId
    AIStreamResponseStepStart:
      type: object
      description: |
        Message emitted by the server to indicate the start of a step in the AI response.
      properties:
        type:
          type: string
          enum:
            - response_step_start
        messageId:
          type: string
          description: |
            The ID of the message that this event is composing.
        stepIndex:
          type: integer
          description: |
            The index of the step of the message that this event is composing.
        phase:
          $ref: "#/components/schemas/AIMessageStepPhase"
      required:
        - type
        - messageId
        - stepIndex
    AIStreamResponseFinish:
      type: object
      description: |
