    ChangeRequestContentChangeUpdatePage:
      type: object
      description: Replace the document of an existing page with another document.
      required:
        - operation
        - page
        - document
      properties:
        operation:
          type: string
          enum:
            - update_page
        page:
          type: string
          description: ID of the page whose content should be updated.
        document:
          $ref: "#/components/schemas/Document"
      example:
        operation: update_page
        page: page_id
        document:
          markdown: |
            # Hello World

            This is a markdown document linking to [another page](/pages/page_id).
    ChangeRequestContentChangeInsertPage:
      type: object
      description: Insert a new page into the change request.
      required:
        - operation
        - title
        - document
      properties:
        operation:
          type: string
          enum:
            - insert_page
        title:
          type: string
          description: Title of the new page.
        into:
          type: string
          description: ID of the parent page to insert the new page into. If omitted, the page is inserted as a root page.
        at:
          type: integer
          minimum: 0
          description: Zero-based index to insert the page at among its siblings. If omitted, the page is appended at the end.
        document:
          $ref: "#/components/schemas/Document"
      example:
        operation: insert_page
        title: New page
        document:
          markdown: |
            # New page

            This is a new page.
    ChangeRequestContentChangeDeletePage:
      type: object
      description: Delete an existing page (and its subpages) from the change request.
      required:
        - operation
        - page
      properties:
        operation:
          type: string
          enum:
            - delete_page
        page:
          type: string
          description: ID of the page to delete.
      example:
        operation: delete_page
        page: page_id
    ChangeRequestContentChangeRevertPage:
      type: object
      description: Revert a page to the state it had in a given revision. If `revision` is omitted, the page is reverted to the change request's base revision. Without `block`, the whole page is reverted — added pages are removed, deleted pages are restored, and modified pages have their document reset. With `block`, only the listed block-level changes in the page's document are reverted (each block is removed if it was added, restored if it was deleted, or reset if it was modified or moved); other blocks and the page's properties/metadata are left untouched.
      required:
        - operation
        - page
      properties:
        operation:
          type: string
          enum:
            - revert_page
        page:
          type: string
          description: ID of the page to revert.
        revision:
          type: string
          description: ID of the revision to revert the page to. If omitted, the change request's base revision is used.
        block:
          type: array
          items:
            type: string
          description: Keys of the specific blocks to revert within the page's document, as they appear in the page's document. If omitted, the whole page is reverted.
      example:
        operation: revert_page
        page: page_id
    ChangeRequestContentChange:
