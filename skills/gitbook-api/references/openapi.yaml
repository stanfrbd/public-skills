openapi: 3.1.0
info:
  title: GitBook API
  description: The GitBook API
  termsOfService: https://policies.gitbook.com
  contact:
    name: API Support
    url: https://gitbook.com/support
    email: support@gitbook.com
  version: 0.0.1-beta
servers:
  - url: "{host}/v1"
    variables:
      host:
        default: https://api.gitbook.com
security:
  - user: []
  - user-internal: []
  - user-staff: []
  - integration: []
  - integration-installation: []
tags:
  - name: organizations
    x-page-icon: building
    x-page-title: Organizations
    x-page-description: Manage your organizations and group your members, spaces, and resources under one collaborative structure.
    description: |
      The Organizations API provides a robust way to handle the administrative structure of your GitBook workspace. By creating and configuring organizations, you can group multiple users, spaces, and collections, simplifying your permission management and fostering efficient collaboration for teams of any size.

      {% openapi-schemas spec="gitbook" schemas="Organization" grouped="false" %}
          The Organization object
      {% endopenapi-schemas %}
  - name: organization-members
    x-page-title: Organization members
    x-page-description: Handle all aspects of membership within an organization, from listing to role management.
    x-parent: organizations
    description: |
      Organization members can be managed through this API, which lets you invite and manage users under a particular organization. You can define roles and permissions to ensure your team has the right level of access.
  - name: organization-invites
    x-page-title: Organization invites
    x-page-description: Streamline the invitation process for new members joining your organization.
    x-parent: organizations
    description: |
      Use this API to create and revoke invitations for new members. By automating invite flows, you can maintain a cohesive onboarding experience for collaborators and speed up team expansion.
  - name: organization-ask
    x-page-title: Organization AI ask
    x-page-description: Unlock AI-driven answers for your organization's content and data.
    x-parent: organizations
    description: |
      Enhance your team's knowledge base with the Organization AI ask endpoint, which allows you to query AI models trained on your organization's GitBook content for quick, intelligent responses.
  - name: sites
    x-page-icon: globe
    x-page-title: Docs sites
    x-page-description: Manage your published docs sites.
    description: |
      The Docs Sites API lets you programmatically manage published documentation sites within your organization. You can list and update all sites created under a specific organization, making it easy to audit or interact with site metadata at scale.

      {% openapi-schemas spec="gitbook" schemas="Site" grouped="false" %}
          The Site object
      {% endopenapi-schemas %}
  - name: site-share-links
    x-page-title: Site share links
    x-page-description: Control how you share docs externally by managing share links for a site.
    x-parent: sites
    description: |
      Manage the lifecycle of share links for your published sites. This includes generating new links for external sharing and revoking or updating existing ones.

      {% openapi-schemas spec="gitbook" schemas="ShareLink" grouped="false" %}
          The ShareLink object
      {% endopenapi-schemas %}
  - name: site-structure
    x-page-title: Site structure
    x-page-description: Retrieve and manipulate the entire hierarchical layout of a site.
    x-parent: sites
    description: |
      Provides a complete overview of how content is organized on a site. With this API, you can discover page nesting, identify sections, and reorder site elements as needed.

      {% openapi-schemas spec="gitbook" schemas="SiteStructure" grouped="false" %}
          The SiteStructure object
      {% endopenapi-schemas %}
  - name: site-publishing-auth
    x-page-title: Site auth
    x-page-description: Manage the authentication needed for publishing your site.
    x-parent: sites
    description: |
      Configure the credentials or tokens required to publish documentation externally. This helps ensure your site is consistently kept up to date.

      {% openapi-schemas spec="gitbook" schemas="SitePublishingAuth" grouped="false" %}
          The SitePublishingAuth object
      {% endopenapi-schemas %}
  - name: site-preview
    x-page-title: Site preview
    x-page-description: Fetch an up-to-date preview of your site before publishing.
    x-parent: sites
    description: |
      Quickly generate a preview of how your site's content and layout will appear once published, allowing for final checks and refinement prior to going live.
  - name: site-customization
    x-page-title: Site customization
    x-page-description: Customize the look and feel of your docs site.
    x-parent: sites
    description: |
      Update your site's branding, styling, and layout to match your organization's identity. This includes theming elements like color palette, logos, and more.

      {% openapi-schemas spec="gitbook" schemas="SiteCustomizationSettings" grouped="false" %}
          The SiteCustomizationSettings object
      {% endopenapi-schemas %}
  - name: site-agent-settings
    x-page-title: Site agent settings
    x-page-description: Configure site-specific issue remediation behavior and agent instructions.
    x-parent: sites
    description: |
      Configure how site issue remediation should behave and provide site-specific instructions for the editing and topic analyst agents.

      {% openapi-schemas spec="gitbook" schemas="SiteAgentSettings" grouped="false" %}
          The SiteAgentSettings object
      {% endopenapi-schemas %}
  - name: site-spaces
    x-page-title: Site spaces
    x-page-description: Control which spaces are linked and displayed in a docs site.
    x-parent: sites
    description: |
      Associate or dissociate your organization's spaces to keep your content organized. This is particularly useful for larger organizations with numerous spaces.

      {% openapi-schemas spec="gitbook" schemas="SiteSpace" grouped="false" %}
          The SiteSpace object
      {% endopenapi-schemas %}
  - name: site-sections
    x-page-title: Site sections
    x-page-description: Create and organize high-level sections for your docs site.
    x-parent: sites
    description: |
      Sections help partition your site's content at the top level. They can be modified, deleted, or reorganized to reflect your site's changing structure.

      {% openapi-schemas spec="gitbook" schemas="SiteSection" grouped="false" %}
          The SiteSection object
      {% endopenapi-schemas %}
  - name: site-section-groups
    x-page-title: Site section groups
    x-page-description: Group and manage sections of your docs for easier organization.
    x-parent: sites
    description: |
      Section groups let you bundle multiple top-level sections together, offering additional structuring capabilities and simplifying navigation for your readers.

      {% openapi-schemas spec="gitbook" schemas="SiteSectionGroup" grouped="false" %}
          The SiteSectionGroup object
      {% endopenapi-schemas %}
  - name: site-redirects
    x-page-title: Site redirects
    x-page-description: Establish redirects for pages that have moved or changed in your docs site.
    x-parent: sites
    description: |
      Keep your site's content fresh without breaking old links. This API allows you to create and manage redirection rules.

      {% openapi-schemas spec="gitbook" schemas="SiteRedirect" grouped="false" %}
          The SiteRedirect object
      {% endopenapi-schemas %}
  - name: site-mcp-servers
    x-page-title: Site MCP servers
    x-page-description: Configure external MCP servers used by your site.
    x-parent: sites
    description: |
      Manage Model Context Protocol (Mcp) servers used by your site.

      {% openapi-schemas spec="gitbook" schemas="SiteMcpServer" grouped="false" %}
          The SiteMcpServer object
      {% endopenapi-schemas %}
  - name: site-channels
    x-page-title: Site channels
    x-page-description: Configure site channels for your docs site.
    x-parent: sites
    description: |
      Manage the channels used as origins for questions and answers in your site ask data.

      {% openapi-schemas spec="gitbook" schemas="SiteChannel" grouped="false" %}
          The SiteChannel object
      {% endopenapi-schemas %}
  - name: site-ads
    x-page-title: Site ads
    x-page-description: Control and customize ad placements on your docs site.
    x-parent: sites
    description: |
      Manage the advertisement strategy within your docs. You can specify ad placements, track usage, and adjust settings to best fit your organization's needs.
  - name: site-permissions
    x-page-title: Site permissions
    x-page-description: Manage which members and teams can access or contribute to a docs site.
    x-parent: sites
    description: |
      Invite, remove, or update users and teams permissions for a site. This provides a way to tightly control collaboration and visibility among your teammates.
  - name: site-insights
    x-page-title: Site insights
    x-page-description: Analyze traffic and engagement metrics for your docs site.
    x-parent: sites
    description: |
      This API delivers insights about how visitors interact with your site, including page views and user engagement, helping you measure and optimize your content strategy.
  - name: site-ai
    x-page-title: Site AI
    x-page-description: Build conversational AI agents for your docs site.
    x-parent: sites
    description: |
      Build advanced conversational AI experiences within your docs site that go beyond basic Q&A.
  - name: site-ask
    x-page-title: Site AI ask
    x-page-description: Allow AI-driven queries within a specific docs site.
    x-parent: sites
    description: |
      Give your users a way to ask content-aware AI queries that are scoped entirely to the site's published documents.
  - name: site-context
    x-page-title: Site context
    x-page-description: Manage context records, connections, and topics for a docs site.
    x-parent: sites
    description: |
      Manage the contextual records and topics used by your site to power AI experiences and insights.

      {% openapi-schemas spec="gitbook" schemas="ContextRecord,ContextConnection,SiteTopic,SiteFinding,SiteFindingPage" grouped="false" %}
          The Site Context objects
      {% endopenapi-schemas %}
  - name: site-questions
    x-page-title: Site questions
    x-page-description: Review questions, answers, and sources generated for a docs site.
    x-parent: sites
    description: |
      Inspect the canonical questions asked on your site, the generated answers linked to each question, and the sources used for each answer.

      {% openapi-schemas spec="gitbook" schemas="SiteQuestion,SiteQuestionAnswer,SiteQuestionAnswerWithResponse,SiteQuestionAnswerSource" grouped="false" %}
          The Site Questions objects
      {% endopenapi-schemas %}
  - name: collections
    x-page-icon: folder
    x-page-title: Collections
    x-page-description: Organize and manage grouped sets of spaces for better content structure.
    description: |
      Collections let you bundle multiple spaces under a unified entity, making large-scale content easier to handle. You can sort content by subject, department, or any grouping logic.

      {% openapi-schemas spec="gitbook" schemas="Collection" grouped="false" %}
          The Collection object
      {% endopenapi-schemas %}
  - name: collection-permissions
    x-page-title: Collection permissions
    x-page-description: Manage which members and teams can access or contribute to a collection of spaces.
    x-parent: collections
    description: |
      Control which users and teams have access to a collection's spaces. This ensures only the right individuals can view or modify sensitive content.
  - name: spaces
    x-page-icon: book-sparkles
    x-page-title: Spaces
    x-page-description: Create, maintain, and remove content spaces.
    description: |
      Spaces are containers for your documentation or knowledge base content. Use this API to create new spaces, manage existing ones, and delete or archive spaces you no longer need.

      {% openapi-schemas spec="gitbook" schemas="Space" grouped="false" %}
          The Space object
      {% endopenapi-schemas %}
  - name: space-content
    x-page-title: Space content
    x-page-description: Import, export, and search content in a space.
    x-parent: spaces
    description: |
      Handle your space content programmatically by creating, updating, or listing pages and files. Ideal for bulk operations or synchronizing with external systems.
  - name: space-comments
    x-page-title: Space comments
    x-page-description: Integrate and manage user comments in a space.
    x-parent: spaces
    description: |
      Comments are a powerful way to gather feedback on your documentation. Use this API to post, list, update, or delete comments and keep conversations organized.

      {% openapi-schemas spec="gitbook" schemas="Comment" grouped="false" %}
          The Comment object
      {% endopenapi-schemas %}
  - name: space-embeds
    x-page-title: Space embeds
    x-page-description: Render or resolve embedded content within a space.
    x-parent: spaces
    description: |
      Automatically fetch metadata or previews for embedded resources such as videos, images, or external docs, enabling richer content experiences in your space.
  - name: space-permissions
    x-page-title: Space permissions
    x-page-description: Manage which members and teams roles and permissions on a per-space basis.
    x-parent: spaces
    description: |
      Give your collaborators the right level of access for specific spaces, or assign entire teams to your spaces and streamline the process of granting or revoking access at scale, without dealing with individual user roles.
  - name: space-integrations
    x-page-title: Space integrations
    x-page-description: Connect external tools and plugins to enhance your space functionality.
    x-parent: spaces
    description: |
      This API handles the registration and removal of integrations, automating how data flows between GitBook and your chosen external services.
  - name: space-git
    x-page-title: Git
    x-page-description: Connect Git repositories to your space for seamless version control.
    x-parent: spaces
    description: |
      Manage the linkage between your GitBook space and external Git repositories, enabling commits, merges, and pull requests directly tied to your documentation.
  - name: change-requests
    x-page-icon: code-pull-request
    x-page-title: Change requests
    x-page-description: Review and collaborate on proposed documentation changes before merging.
    description: |
      This API helps you keep your space clean by letting contributors propose changes, review them, and then merge or discard as needed.

      {% openapi-schemas spec="gitbook" schemas="ChangeRequest" grouped="false" %}
          The ChangeRequest object
      {% endopenapi-schemas %}
  - name: change-request-content
    x-page-title: Change request content
    x-page-description: Manage the actual content changes associated with a change request.
    x-parent: change-requests
    description: |
      Retrieve or update the pages and files tied to an open change request. This lets you preview alterations and merge them when ready.
  - name: change-request-contributors
    x-page-title: Change request contributors
    x-page-description: See who's participating in the change request.
    x-parent: change-requests
    description: |
      Quickly access the full list of collaborators and their contributions within a change request for better traceability and communication.

      {% openapi-schemas spec="gitbook" schemas="UserContributor" grouped="false" %}
          The UserContributor object
      {% endopenapi-schemas %}
  - name: change-request-reviewers
    x-page-title: Change request reviewers
    x-page-description: Assign or list requested reviewers for a change request.
    x-parent: change-requests
    description: |
      Ensure quality by requesting and tracking reviewer feedback in your GitBook flow. This endpoint helps orchestrate the entire review cycle.

      {% openapi-schemas spec="gitbook" schemas="ChangeRequestRequestedReviewer" grouped="false" %}
          The ChangeRequestRequestedReviewer object
      {% endopenapi-schemas %}
  - name: change-request-comments
    x-page-title: Change request comments
    x-page-description: Engage in threaded conversations on proposed changes.
    x-parent: change-requests
    description: |
      This API powers the inline discussion around any new or updated documentation. Participate in comment threads and resolve them after reaching consensus.

      {% openapi-schemas spec="gitbook" schemas="Comment" grouped="false" %}
          The Comment object
      {% endopenapi-schemas %}
  - name: analytics
    x-page-icon: chart-line
    x-page-title: Analytics
    x-page-description: Tap into metrics that reveal your content's performance and usage patterns.
    description: |
      Gather data-driven insights on how users interact with your spaces, pages, or entire site. Analytics can highlight trends and guide future content improvements.
  - name: translations
    x-page-icon: language
    x-page-title: Translations
    x-page-description: Configure multi-language support and translation options for your documentation.
    description: |
      The Translations API provides ways to localize your content into various languages. It supports custom strings, default language settings, and more.
  - name: translation-languages
    x-page-title: Translations languages
    x-page-description: Manage the individual language configurations for your docs translation setup.
    x-parent: translations
    description: |
      Enable or disable specific languages, configure default text direction, or adjust advanced translation settings to ensure clarity for your global audience.

      {% openapi-schemas spec="gitbook" schemas="TranslationLanguageSettings" grouped="false" %}
          The TranslationLanguageSettings object
      {% endopenapi-schemas %}
  - name: imports
    x-page-icon: cloud-arrow-up
    x-page-title: Imports
    x-page-description: Import content into GitBook.
    description: |
      The Imports API provides allows you to import content into GitBook.
  - name: glossary
    x-page-title: Glossary
    x-page-description: Manage custom terms translations used by the translation feature.
    x-parent: translations
    description: |
      Define terms and specify their translations for different languages to ensure consistent wording.

      {% openapi-schemas spec="gitbook" schemas="GlossaryEntry" grouped="false" %}
          The GlossaryEntry object
      {% endopenapi-schemas %}
  - name: integrations
    x-page-icon: puzzle-piece
    x-page-title: Integrations
    x-page-description: Install and handle third-party integrations for extended GitBook functionality.
    description: |
      Expand the capabilities of GitBook by connecting it with various external platforms—CRM, finding trackers, or CI/CD pipelines—through standardized integration endpoints.
  - name: urls
    x-page-icon: link
    x-page-title: URLs
    x-page-description: Configure where and how your GitBook content can be accessed.
    description: |
      Manage official endpoints, direct deep links, or short links for your content. This allows you to keep track of multiple custom URLs or vanity links under one system.
  - name: openapi
    x-page-icon: code
    x-page-title: OpenAPI
    x-page-description: Upload, access, or version-control your OpenAPI specifications directly in GitBook.
    description: |
      The OpenAPI endpoints let you integrate your existing or newly generated OpenAPI definitions into GitBook. This includes uploading, updating, and retrieving specs.

      {% openapi-schemas spec="gitbook" schemas="OpenAPISpec" grouped="false" %}
          The OpenAPISpec object
      {% endopenapi-schemas %}
  - name: openapi-versions
    x-page-title: OpenAPI spec versions
    x-page-description: Track changes to your OpenAPI documents by versioning them.
    x-parent: openapi
    description: |
      Keep a history of your OpenAPI specs, enabling you to compare different versions, revert, or maintain multiple concurrent versions for testing or documentation.

      {% openapi-schemas spec="gitbook" schemas="OpenAPISpecVersion" grouped="false" %}
          The OpenAPISpecVersion object
      {% endopenapi-schemas %}
  - name: custom-fonts
    x-page-icon: font
    x-page-title: Custom fonts
    x-page-description: Bring your own fonts to personalize your documentation style.
    description: |
      Upload and manage custom fonts for branding or aesthetic purposes. Once added, fonts can be applied to your spaces or sites to achieve a unique look.

      {% openapi-schemas spec="gitbook" schemas="CustomizationFontDefinition" grouped="false" %}
          The CustomizationFontDefinition object
      {% endopenapi-schemas %}
  - name: billing
    x-page-icon: credit-card
    x-page-title: Billing
    x-page-description: Organize payment details and subscription plans for your organization.
    description: |
      Centralize billing activities here, including updating payment methods, adjusting subscriptions, or reviewing invoices. Simplify how you track and control costs.
  - name: hive
    x-page-icon: network-wired
    x-page-title: Hive
    x-page-description: Bring teams together and share resources effectively across GitBook.
    description: |
      Hive is a collaborative layer over your GitBook data, designed to streamline knowledge sharing, cross-project tasks, and reduce duplicate efforts among your teammates.
  - name: subdomains
    x-page-icon: diagram-project
    x-page-title: Subdomains
    x-page-description: Manage and configure organization-specific subdomains for your docs.
    description: |
      Provide a branded subdomain for each organization to create a consistent user experience. This API supports subdomain creation, DNS checks, and more.

      {% openapi-schemas spec="gitbook" schemas="Subdomain" grouped="false" %}
          The Subdomain object
      {% endopenapi-schemas %}
  - name: users
    x-page-icon: users
    x-page-title: Users
    x-page-description: Retrieve and manage user information and profiles.
    description: |
      The Users API allows you to fetch data about GitBook users, including the authenticated account or other team members by ID. This is crucial for customizing permissions, personalizing content, or establishing user-specific flows.

      {% openapi-schemas spec="gitbook" schemas="User" grouped="false" %}
          The User object
      {% endopenapi-schemas %}
  - name: teams
    x-page-icon: people-group
    x-page-title: Teams
    x-page-description: Create and manage teams as reusable groups of users.
    description: |
      Teams offer a convenient way to assign roles and access to multiple users at once. This helps maintain large-scale projects more efficiently by reducing overhead in user-by-user management.

      {% openapi-schemas spec="gitbook" schemas="Team" grouped="false" %}
          The Team object
      {% endopenapi-schemas %}
  - name: team-members
    x-page-title: Team members
    x-page-description: Control membership at the team level for cohesive role management.
    x-parent: teams
    description: |
      Easily add or remove users from teams, as well as fine-tune their specific roles within a team to ensure secure, well-organized collaboration.

      {% openapi-schemas spec="gitbook" schemas="TeamMember" grouped="false" %}
          The TeamMember object
      {% endopenapi-schemas %}
  - name: sso
    x-page-icon: lock
    x-page-title: SSO
    x-page-description: Configure Single Sign-On solutions to unify your organization's authentication.
    description: |
      Tie GitBook into your corporate identity management and authentication providers (like SAML or OAuth). This centralizes user authentication and improves security.

      {% openapi-schemas spec="gitbook" schemas="Subdomain" grouped="false" %}
          The Subdomain object
      {% endopenapi-schemas %}
  - name: storage
    x-page-icon: database
    x-page-title: Storage
    x-page-description: Upload and store files directly within your GitBook organization.
    description: |
      Whether you're hosting images, documents, or other assets, Storage endpoints allow you to integrate those files into your documentation and spaces seamlessly.
  - name: custom-hostnames
    x-page-icon: server
    x-page-title: Custom hostnames
    x-page-description: Serve your GitBook content from fully branded, custom hostnames.
    description: |
      Extend your brand identity by mapping personalized domain names to your docs. This can help unify your documentation site with your existing company properties.

      {% openapi-schemas spec="gitbook" schemas="CustomHostname" grouped="false" %}
          The CustomHostname object
      {% endopenapi-schemas %}
  - name: system
    x-page-icon: gears
    x-page-title: System info
    x-page-description: Programmatically check GitBook API system status and version details.
    description: |
      Use these endpoints to monitor the overall health of GitBook's infrastructure or to retrieve version information for debugging and compliance purposes.
paths:
  /:
    get:
      operationId: getApiInformation
      tags:
        - system
      summary: Get API information
      description: Access the release version and build date of the GitBook codebase.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiInformation"
  /user:
    get:
      operationId: getAuthenticatedUser
      summary: Get profile of authenticated user
      tags:
        - users
        - critical
      security:
        - user: []
        - oauth:
            - user:read
      description: |
        Returns details about the user associated with the authentication provided in the request's authorization header.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          $ref: "#/components/responses/NotFoundError"
  /user/notifications/token:
    post:
      operationId: createUserNotificationsToken
      summary: Create a JWT to access the in-app notifications service
      description: |
        Generates a JWT for the authenticated user. This token is used by the frontend notifications client to access user endpoints.
      tags:
        - users
      security:
        - user-internal: []
      responses:
        "200":
          description: The notifications service User JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APITemporaryToken"
  /users/{userId}:
    get:
      operationId: getUserById
      summary: Get a user by its ID
      tags:
        - users
        - critical
      security:
        - user: []
      description: |
        Provides publicly available information about someone with a GitBook account.
      parameters:
        - $ref: "#/components/parameters/userId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          $ref: "#/components/responses/NotFoundError"
    patch:
      operationId: updateUserById
      summary: Update a user by its ID
      tags:
        - users
        - critical
      security:
        - user: []
      description: |
        Update a GitBook account's details.
      parameters:
        - $ref: "#/components/parameters/userId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                displayName:
                  type: string
                  description: Full name for the user
                  minLength: 1
                  maxLength: 64
                photoURL:
                  $ref: "#/components/schemas/URL"
      responses:
        "200":
          description: The user has been updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          $ref: "#/components/responses/NotFoundError"
  /spaces/{spaceId}:
    get:
      operationId: getSpaceById
      summary: Get full details of a space by its ID
      description: Returns the full metadata for a space. Use this to resolve a spaceId into a complete Space object. If you only need content, use the content endpoint instead.
      x-gitbook-mcp: true
      tags:
        - spaces
        - critical
      security:
        - user: []
        - integration: []
        - integration-installation: []
        - oauth:
            - space:read
      parameters:
        - $ref: "#/components/parameters/spaceId"
        - $ref: "#/components/parameters/siteShareKey"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Space"
    patch:
      operationId: updateSpaceById
      summary: Update a space's title, icon, or settings
      description: Updates a space's metadata and settings. To update page content, use the change-request workflow instead.
      x-gitbook-mcp: true
      tags:
        - spaces
      security:
        - user: []
        - oauth:
            - space:write
      parameters:
        - $ref: "#/components/parameters/spaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  properties:
                    editMode:
                      $ref: "#/components/schemas/SpaceEditMode"
                    title:
                      $ref: "#/components/schemas/SpaceTitle"
                    defaultLevel:
                      $ref: "#/components/schemas/DefaultLevel"
                    language:
                      $ref: "#/components/schemas/TranslationLanguage"
                    mergeRules:
                      $ref: "#/components/schemas/MergeRulesSpaceConfiguration"
                - oneOf:
                    - type: object
                      title: Emoji
                      properties:
                        emoji:
                          $ref: "#/components/schemas/Emoji"
                      required:
