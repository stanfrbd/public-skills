                    - type: object
                      properties:
                        mode:
                          description: Search only in the site spaces provided. Deprecated, use scope instead.
                          deprecated: true
                          type: string
                          enum:
                            - specific
                        siteSpaceIds:
                          type: array
                          minLength: 1
                          items:
                            type: string
                      required:
                        - siteSpaceIds
                    - type: object
                      properties:
                        mode:
                          description: Search in the current site space and all section's defaults. Deprecated, use scope instead.
                          deprecated: true
                          type: string
                          enum:
                            - current
                        siteSpaceId:
                          type: string
                      required:
                        - mode
                        - siteSpaceId
                    - type: object
                      properties:
                        mode:
                          description: Search in all site-spaces. Deprecated, use scope instead.
                          deprecated: true
                          type: string
                          enum:
                            - all
                      required:
                        - mode
