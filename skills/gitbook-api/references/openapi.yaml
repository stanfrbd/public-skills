          $ref: "#/components/schemas/IntegrationContentSecurityPolicy"
      required:
        - object
        - name
        - version
        - title
        - scopes
        - categories
        - visibility
        - target
        - verified
        - previewImages
        - externalLinks
        - owner
        - permissions
        - urls
    SpaceIntegrationBlocks:
      type: array
