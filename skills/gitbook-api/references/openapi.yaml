      oneOf:
        - $ref: "#/components/schemas/SiteFeatureKey"
        - $ref: "#/components/schemas/BillingMeter"
        - type: string
          enum:
            - settings
            - billing-page
            - end-of-trial
    SitePublishingAuth:
      allOf:
        - oneOf:
            - $ref: "#/components/schemas/VisitorAuthCustomBackend"
            - $ref: "#/components/schemas/VisitorAuthIntegrationBackend"
        - type: object
          properties:
            object:
              type: string
              description: Type of Object, always equals to "publishing-auth"
              enum:
                - publishing-auth
            privateKey:
              type: string
              description: Private key used to sign JWT tokens.
            fallbackURL:
              type: string
              format: uri
              description: URL to redirect to when the authenticated access secret is invalid.
            logoutURL:
              type: string
              format: uri
              description: URL used to log visitors out from the upstream custom auth backend.
            integration:
              type: string
              description: |
                Name of the authenticated access integration installed on the site (if any).
                It is also the one being used as VA backend when the published auth settings are configured to use "integration" as backend.
          required:
            - object
            - privateKey
    SitePublishingAuthUpdate:
      allOf:
        - oneOf:
            - $ref: "#/components/schemas/VisitorAuthCustomBackend"
            - $ref: "#/components/schemas/VisitorAuthIntegrationBackend"
        - type: object
          properties:
            fallbackURL:
              type:
                - string
                - "null"
              format: uri
              description: A fallback URL that will be used if authentication fails. If not provided, the fallback URL will not be changed. If set to null, the fallback URL will be unset.
            logoutURL:
              type:
                - string
                - "null"
              format: uri
              description: A logout URL used to log visitors out from the upstream custom auth backend. If not provided, the logout URL will not be changed. If set to null, the logout URL will be unset.
    SiteCustomizationSettingsInput:
      allOf:
        - $ref: "#/components/schemas/SiteCustomizationSettingsBase"
    SiteSearchScope:
      oneOf:
        - type: object
          required:
            - mode
          properties:
            mode:
              description: |
                Search across all sections of a site, only including the default content of each section. This scope is wide and shallow. You may optionally specify a list of additional site spaces to search in alongside the default content.
              type: string
              enum:
                - default
            currentSiteSpace:
              type: string
              description: |
                The ID of the site space that must always be included in the search results. The language of this site space will be used to match other site spaces with the same language, if applicable.
        - type: object
          required:
            - mode
            - siteSpaceIds
          properties:
            mode:
              description: Only search in the provided site spaces.
              type: string
              enum:
                - specific
            siteSpaceIds:
              type: array
              minLength: 1
              items:
                type: string
        - type: object
          required:
            - mode
          properties:
            mode:
              description: Search in all sections and site spaces. This scope is wide and deep.
              type: string
              enum:
                - all
