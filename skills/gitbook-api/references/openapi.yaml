        - updatedAt
        - createdAt
      default: updatedAt
      description: The field to sort change requests by. Defaults to 'updatedAt'.
    ChangeRequestReviewStatus:
      type: string
      description: Status of a change request review.
      enum:
        - changes-requested
        - approved
    EmojiReaction:
      type: object
