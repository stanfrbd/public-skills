      summary: Ask a question in a site
      description: The response is streamed.
      tags:
        - site-ask
      security:
        - user: []
        - oauth:
            - site:ask
      parameters:
        - $ref: "#/components/parameters/organizationId"
        - $ref: "#/components/parameters/siteId"
        - $ref: "#/components/parameters/documentFormat"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - question
                - scope
              properties:
                question:
                  type: string
                  maxLength: 512
                context:
                  type: object
                  description: |
                    You may optionally provide additional information about the context of the question. This doesn't affect the scope of the search, but GitBook may use this information to provide a better answer. Generally speaking, you should provide as much context as possible.
                  properties:
                    siteSpaceId:
                      type: string
                    goal:
                      type: string
                      maxLength: 1024
                      description: |
                        The end goal the agent is trying to accomplish on behalf of the user. Unlike the question, which is the immediate query, the goal describes the broader task or outcome the agent is working towards. GitBook uses this to steer the answer towards what is ultimately useful for that goal.
                scope:
                  $ref: "#/components/schemas/SiteSearchScope"
                session:
                  $ref: "#/components/schemas/SiteInsightsSession"
      responses:
        "200":
          description: OK
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/SearchAIAnswerStream"
