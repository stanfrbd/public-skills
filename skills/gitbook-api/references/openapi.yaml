      tags:
        - site-share-links
      security:
        - user: []
        - oauth:
            - site:auth:write
      parameters:
        - $ref: "#/components/parameters/organizationId"
        - $ref: "#/components/parameters/siteId"
        - $ref: "#/components/parameters/shareLinkId"
      responses:
        "204":
