    GitSyncOperationState:
      type: string
      description: |
        * `running`: The operation is still running
        * `failure`: The operation failed
        * `success`: The operation was successful
      enum:
        - running
        - failure
        - success
    GitSyncOperationDirection:
      type: string
      enum:
        - export
        - import
    GitSyncOperationStage:
      type: string
      description: |
        Core stages of a Git Sync process. This is not exhaustive, but should cover
        the important ones.
        - repo_fetch: Includes fetching the latest repository contents from remote provider.
        - config_check: Includes checking if the YAML config is valid, etc.
        - content_process: Includes processing of pages & files to be imported/exported.
        - finalize: Includes finalizing the sync process like creating the commit on git, or
        creating a new revision.
      enum:
        - repo_fetch
        - config_check
        - content_process
        - finalize
    GitSyncOperation:
      type: object
      properties:
        state:
          $ref: "#/components/schemas/GitSyncOperationState"
        direction:
          $ref: "#/components/schemas/GitSyncOperationDirection"
        stage:
          $ref: "#/components/schemas/GitSyncOperationStage"
        dispatchedTasks:
          type: number
        completedTasks:
          type: number
        startedAt:
          description: Date when the operation was started
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          description: Date when the operation was last updated
          $ref: "#/components/schemas/Timestamp"
        completedAt:
          description: Date when the operation was successful (when state is `success`)
          $ref: "#/components/schemas/Timestamp"
        error:
          type: string
          description: Error details, defined if state is `failure`.
      required:
        - state
        - direction
        - stage
        - dispatchedTasks
        - completedTasks
        - startedAt
        - updatedAt
    GitSyncSiteStructureSectionGroup:
      type: object
      additionalProperties: false
      description: |
        A section group — a container that nests sections (and other section
        groups). Discriminated by `type: section-group`. Up to one level of nested
        section groups is allowed.
      properties:
        type:
          type: string
          enum:
            - section-group
          description: Discriminator for a section group node.
        key:
          type: string
          description: |
            Stable identifier for this section group, used as the Git Sync key.
            Must be unique amongst all other section groups of the site. For
            example: `section-group-product` or `section-group-1`.
          minLength: 1
        title:
          $ref: "#/components/schemas/SiteSectionGroupTitle"
        localizedTitle:
          $ref: "#/components/schemas/LocalizedString128"
        icon:
          $ref: "#/components/schemas/Icon"
        draft:
          type: boolean
          description: Whether the section group is draft and not live.
        children:
          type: array
          description: Section or section group nodes nested under this group.
          items:
            oneOf:
              - $ref: "#/components/schemas/GitSyncSiteStructureSectionGroup"
              - $ref: "#/components/schemas/GitSyncSiteStructureSection"
      required:
        - type
        - key
        - title
    GitSyncSiteStructureSpace:
      type: object
      additionalProperties: false
      description: |
        A space — a single content unit in the site's navigation tree. Discriminated
        by `type: space`.

        The space's content lives in the synced repository at the directory pointed
        to by `content.directory`. Hierarchy comes from where the space appears in
        the YAML (under a section, a section group, or at the root), not from an
        explicit parent reference.
      properties:
        type:
          type: string
          enum:
            - space
          description: Discriminator for a space node.
        key:
          type: string
          description: |
            Stable identifier for this space, used as the Git Sync key. Must be
            unique amongst all other spaces of the site. For example: `space-docs`
            or `space-1`.
          minLength: 1
        title:
          type: string
          minLength: 1
        localizedTitle:
          $ref: "#/components/schemas/LocalizedString128"
        path:
          $ref: "#/components/schemas/SiteSpacePath"
        default:
          type: boolean
          description: Whether this is the default space for the site.
        hidden:
          type: boolean
          description: Whether the space is hidden from the site's navigation.
        draft:
          type: boolean
          description: Whether the space is draft and not live.
        condition:
          $ref: "#/components/schemas/Expression"
        content:
          type: object
          additionalProperties: false
          description: Where the space's content lives in the synced repository.
          properties:
            directory:
              type: string
              description: Repository-relative directory containing this space's content.
              minLength: 1
            language:
              $ref: "#/components/schemas/TranslationLanguage"
          required:
            - directory
      required:
        - type
        - key
        - title
        - path
        - content
    GitSyncSiteStructureSection:
      type: object
      additionalProperties: false
      description: |
        A section — a group of spaces sharing a top-level navigation entry.
        Discriminated by `type: section`.

        Spaces inside a section are listed inline under `children`. A site with
        sections must mark exactly one section with `default: true`.
      properties:
        type:
          type: string
          enum:
            - section
          description: Discriminator for a section node.
        key:
          type: string
          description: |
            Stable identifier for this section, used as the Git Sync key. Must be
            unique amongst all other sections of the site. For example:
            `section-guides` or `section-1`.
          minLength: 1
        title:
          $ref: "#/components/schemas/SiteSectionTitle"
        localizedTitle:
          $ref: "#/components/schemas/LocalizedString128"
        description:
          $ref: "#/components/schemas/SiteSectionDescription"
        localizedDescription:
          $ref: "#/components/schemas/LocalizedString256"
        icon:
          $ref: "#/components/schemas/Icon"
        default:
          type: boolean
          description: Whether this is the default section for the site.
        draft:
          type: boolean
          description: Whether the section is draft and not live.
        path:
          $ref: "#/components/schemas/SiteSectionPath"
        condition:
          $ref: "#/components/schemas/Expression"
        children:
          type: array
          description: Space nodes nested under this section.
          items:
            $ref: "#/components/schemas/GitSyncSiteStructureSpace"
      required:
        - type
        - key
        - title
        - path
    GitSyncSiteStructureNode:
      description: |
        A single node in a Git Sync site structure tree — a section group, a
        section, or a space, discriminated by `type`.
      oneOf:
        - $ref: "#/components/schemas/GitSyncSiteStructureSectionGroup"
        - $ref: "#/components/schemas/GitSyncSiteStructureSection"
        - $ref: "#/components/schemas/GitSyncSiteStructureSpace"
    GitSyncSiteStructure:
      type: array
      description: |
        Hierarchical structure of a site in a Git Sync YAML. Each entry is one of
        three node types: a section group, a section, or a space.
      items:
        $ref: "#/components/schemas/GitSyncSiteStructureNode"
    GitSyncSiteCustomizationFontSource:
      type: string
      description: |
        Reserved repository-relative path to the font file:
        `.gitbook/assets/<key>-<weight>.<ext>`, where `<key>` is the parent
        font definition's `key`, `<weight>` is this face's `weight`, and
        `<ext>` is one of `woff2`, `woff`.

        For example, a font with `key: brand` and a `700` face is read from
        `.gitbook/assets/brand-700.woff2`. Any other path is rejected.
      minLength: 1
    GitSyncSiteCustomizationFontDefinition:
      type: object
      description: |
        Custom font definition for a `site.fonts[]` entry. Referenced from
        `customization.styling.font` or `customization.styling.monospaceFont` via
        its `key`.

        Rules enforced on a definition:
        - It must declare exactly one face for the `400` weight and one for the
          `700` weight; the `600` weight is optional. No other weights are allowed,
          and a weight may not be declared more than once.
        - Each face has a single source file whose `url` is the reserved repository
          asset path `.gitbook/assets/<key>-<weight>.<ext>` (`<ext>` is `woff2` or
          `woff`). For example a definition with `key: brand` is read from
          `.gitbook/assets/brand-400.woff2` and `.gitbook/assets/brand-700.woff2`.
      properties:
        key:
          type: string
          description: |
            Stable identifier referenced from `styling.font` /
            `styling.monospaceFont`, and used as the prefix of each face's
            reserved asset path (`.gitbook/assets/<key>-<weight>.<ext>`).
          minLength: 1
          pattern: ^[A-Za-z0-9][A-Za-z0-9_-]*$
        fontFamily:
          $ref: "#/components/schemas/FontFamily"
        fontFaces:
          type: object
          description: |
            Font-face declarations keyed by weight, each specifying its single
            source file. The `400` and `700` weights are required; `600` is
            optional.
          properties:
            "400":
              $ref: "#/components/schemas/GitSyncSiteCustomizationFontSource"
            "600":
              $ref: "#/components/schemas/GitSyncSiteCustomizationFontSource"
            "700":
              $ref: "#/components/schemas/GitSyncSiteCustomizationFontSource"
          required:
            - "400"
            - "700"
          additionalProperties: false
      required:
        - key
        - fontFamily
        - fontFaces
    GitSyncSiteCustomizationThemedColor:
      type: object
      description: |
        Themed color (light + dark).
      properties:
        light:
          $ref: "#/components/schemas/Color"
        dark:
          $ref: "#/components/schemas/Color"
      required:
        - light
        - dark
    GitSyncSiteCustomizationTint:
      type: object
      description: |
        Tint configuration.
      properties:
        color:
          $ref: "#/components/schemas/GitSyncSiteCustomizationThemedColor"
      required:
        - color
    GitSyncSiteCustomizationFontReference:
      type: object
      description: |
        Reference to a custom font defined under `site.fonts[]`. Matches by `key`.
      properties:
        key:
          type: string
          description: Matches the `key` of an entry in `site.fonts[]`.
          minLength: 1
      required:
        - key
    GitSyncSiteCustomizationFont:
      description: |
        Body font for the site. Either one of the built-in `CustomizationDefaultFont`
        values, or a reference to a custom font declared in `site.fonts[]`.
      oneOf:
        - $ref: "#/components/schemas/CustomizationDefaultFont"
        - $ref: "#/components/schemas/GitSyncSiteCustomizationFontReference"
    GitSyncSiteCustomizationMonospaceFont:
      description: |
        Monospace font for the site. Either one of the built-in
        `CustomizationDefaultMonospaceFont` values, or a reference to a custom font
        declared in `site.fonts[]`.
      oneOf:
        - $ref: "#/components/schemas/CustomizationDefaultMonospaceFont"
        - $ref: "#/components/schemas/GitSyncSiteCustomizationFontReference"
    GitSyncSiteCustomizationThemedCodeTheme:
      type: object
      description: |
        Themed code theme (light + dark).
      properties:
        light:
          $ref: "#/components/schemas/CustomizationCodeTheme"
        dark:
          $ref: "#/components/schemas/CustomizationCodeTheme"
      required:
        - light
        - dark
    GitSyncSiteCustomizationCodeThemes:
      type: object
      description: |
        Code-block syntax-highlighting themes — one for default code blocks and one for OpenAPI request/response samples.
      properties:
        default:
          $ref: "#/components/schemas/GitSyncSiteCustomizationThemedCodeTheme"
        openapi:
          $ref: "#/components/schemas/GitSyncSiteCustomizationThemedCodeTheme"
      required:
        - default
        - openapi
    GitSyncSiteCustomizationSidebar:
      type: object
      description: |
        Sidebar style settings.
      properties:
        background:
          $ref: "#/components/schemas/CustomizationSidebarBackgroundStyle"
        list:
          $ref: "#/components/schemas/CustomizationSidebarListStyle"
      required:
        - background
        - list
    GitSyncSiteCustomizationStyling:
      type: object
      description: |
        Styling settings.
      properties:
        theme:
          $ref: "#/components/schemas/CustomizationTheme"
        primaryColor:
          $ref: "#/components/schemas/GitSyncSiteCustomizationThemedColor"
        tint:
          $ref: "#/components/schemas/GitSyncSiteCustomizationTint"
        infoColor:
          $ref: "#/components/schemas/GitSyncSiteCustomizationThemedColor"
        successColor:
          $ref: "#/components/schemas/GitSyncSiteCustomizationThemedColor"
        warningColor:
          $ref: "#/components/schemas/GitSyncSiteCustomizationThemedColor"
        dangerColor:
          $ref: "#/components/schemas/GitSyncSiteCustomizationThemedColor"
        corners:
          $ref: "#/components/schemas/CustomizationCorners"
        depth:
          $ref: "#/components/schemas/CustomizationDepth"
        links:
          $ref: "#/components/schemas/CustomizationLinksStyle"
        font:
          $ref: "#/components/schemas/GitSyncSiteCustomizationFont"
        monospaceFont:
          $ref: "#/components/schemas/GitSyncSiteCustomizationMonospaceFont"
        icons:
          $ref: "#/components/schemas/CustomizationIconsStyle"
        codeTheme:
          $ref: "#/components/schemas/GitSyncSiteCustomizationCodeThemes"
        sidebar:
          $ref: "#/components/schemas/GitSyncSiteCustomizationSidebar"
        search:
          $ref: "#/components/schemas/CustomizationSearchStyle"
    GitSyncSiteCustomizationAssetPath:
      type: string
      description: |
        Repository-relative path to an asset in a site Git Sync, e.g.
        `.gitbook/assets/header-logo-light.svg`. Absolute URLs are not accepted
        here — Git Sync assets must live in the synced repository under
        `.gitbook/assets/`.

        This is the shared base type and only validates the `.gitbook/assets/`
        prefix. Each field that uses it additionally reserves a specific filename
        and set of allowed extensions (e.g. the header logo must be
        `header-logo-light.<ext>` / `header-logo-dark.<ext>`); see the description
        on the consuming field for the exact reserved path.
      pattern: ^\.gitbook/assets/.+
      maxLength: 2048
    GitSyncSiteCustomizationThemedAssetPath:
      type: object
      description: |
        Light/dark variants of a Git Sync repository asset path. Used for logos and
        favicons that switch with the active theme. Both variants are required.

        Each consuming field reserves the exact light/dark filenames and allowed
        extensions (e.g. header logo → `header-logo-light.<ext>` /
        `header-logo-dark.<ext>`); see the description on the consuming field.
      properties:
        light:
          $ref: "#/components/schemas/GitSyncSiteCustomizationAssetPath"
        dark:
          $ref: "#/components/schemas/GitSyncSiteCustomizationAssetPath"
      required:
        - light
        - dark
    GitSyncSiteCustomizationFavicon:
      description: |
        Favicon for the published site. The `icon` variant references a repository asset path; the `emoji` variant uses a single emoji character;
      oneOf:
        - type: object
          properties:
            icon:
              description: |
                Themed favicon. Each variant must use its reserved repository
                asset path — light: `.gitbook/assets/favicon-light.<ext>`,
                dark: `.gitbook/assets/favicon-dark.<ext>`, where `<ext>` is
                the image's file extension (e.g. `png`, `svg`, `ico`). Any
                other filename is rejected.
              $ref: "#/components/schemas/GitSyncSiteCustomizationThemedAssetPath"
          required:
            - icon
        - type: object
          properties:
            emoji:
              $ref: "#/components/schemas/Emoji"
          required:
            - emoji
    GitSyncSiteCustomizationContentLinkTo:
      type: string
      description: |
        Link destination, written as a path-string in YAML. Same format as
        markdown content links, e.g. `https://example.com`, `/pages/<id>`,
        `/spaces/<id>/pages/<id>`, `#anchor`, `/files/<id>`, `/spaces/<id>`.
    GitSyncSiteCustomizationContentLink:
      type: object
      description: |
        A label plus a destination, used inside header items, footer groups, and announcements.
      properties:
        title:
          $ref: "#/components/schemas/CustomizationContentLinkTitle"
        localizedTitle:
          description: Localized overrides for the link title, keyed by locale.
          $ref: "#/components/schemas/LocalizedString64"
        to:
          $ref: "#/components/schemas/GitSyncSiteCustomizationContentLinkTo"
      required:
        - title
        - to
    GitSyncSiteCustomizationHeaderItem:
      type: object
      description: |
        A single item in the published site's top navigation bar.
      properties:
        title:
          type: string
        localizedTitle:
          description: Localized overrides for the header item title, keyed by locale.
          $ref: "#/components/schemas/LocalizedString"
        style:
          type: string
          enum:
            - link
            - button-primary
            - button-secondary
        to:
          description: |
            Header item destination. Use `null` for items that act as a
            dropdown root without a link of their own.
          oneOf:
            - $ref: "#/components/schemas/GitSyncSiteCustomizationContentLinkTo"
            - type: "null"
        links:
          type: array
          description: Sub-links shown as a dropdown under this header item. Empty array means no dropdown.
          items:
            $ref: "#/components/schemas/GitSyncSiteCustomizationContentLink"
        condition:
          description: Conditional expression evaluated to decide whether the item is shown to the visitor.
          $ref: "#/components/schemas/Expression"
      required:
        - title
        - to
        - links
    GitSyncSiteCustomizationHeader:
      type: object
      description: |
        Header settings.
      properties:
        logo:
          description: |
            Themed header logo. Each variant must use its reserved repository
            asset path — light: `.gitbook/assets/header-logo-light.<ext>`, dark:
            `.gitbook/assets/header-logo-dark.<ext>`, where `<ext>` is the
            image's file extension (e.g. `png`, `svg`). Any other filename is
            rejected.
          $ref: "#/components/schemas/GitSyncSiteCustomizationThemedAssetPath"
        primaryLink:
          $ref: "#/components/schemas/GitSyncSiteCustomizationContentLinkTo"
        links:
          type: array
          items:
            $ref: "#/components/schemas/GitSyncSiteCustomizationHeaderItem"
    GitSyncSiteCustomizationFooterGroup:
      type: object
      description: |
        A group of links shown in the published site's footer.
      properties:
        title:
          type: string
        localizedTitle:
          description: Localized overrides for the footer group title, keyed by locale.
          $ref: "#/components/schemas/LocalizedString"
        links:
          type: array
          items:
            $ref: "#/components/schemas/GitSyncSiteCustomizationContentLink"
      required:
        - title
        - links
    GitSyncSiteCustomizationFooter:
      type: object
      description: |
        Footer settings.
      properties:
        logo:
          description: |
            Themed footer logo. Each variant must use its reserved repository
            asset path — light: `.gitbook/assets/footer-logo-light.<ext>`, dark:
            `.gitbook/assets/footer-logo-dark.<ext>`, where `<ext>` is the
            image's file extension (e.g. `png`, `svg`). Any other filename is
            rejected.
          $ref: "#/components/schemas/GitSyncSiteCustomizationThemedAssetPath"
        groups:
          type: array
          items:
            $ref: "#/components/schemas/GitSyncSiteCustomizationFooterGroup"
        copyright:
          type: string
          maxLength: 300
    GitSyncSiteCustomizationAnnouncement:
      type: object
      description: |
        Announcement banner shown above the published site.
      properties:
        enabled:
          description: Whether to show the site's announcement.
          type: boolean
        message:
          $ref: "#/components/schemas/CustomizationAnnouncementMessage"
        localizedMessage:
          description: Localized overrides for the announcement message, keyed by locale.
          $ref: "#/components/schemas/LocalizedString128"
        link:
          description: The content or URL the announcement links to when clicked.
          $ref: "#/components/schemas/GitSyncSiteCustomizationContentLink"
        style:
          description: Semantic style of the announcement banner.
          type: string
          enum:
            - info
            - warning
            - danger
            - success
      required:
        - enabled
        - message
        - style
    GitSyncSiteCustomizationThemeModes:
      type: object
      description: |
        Dark/light theme mode settings.
      properties:
        default:
          $ref: "#/components/schemas/CustomizationDefaultThemeMode"
        toggeable:
          description: Whether readers can switch between dark and light mode.
          type: boolean
      required:
        - default
        - toggeable
    GitSyncSiteCustomizationFeedback:
      type: object
      description: |
        Reader feedback settings.
      properties:
        enabled:
          type: boolean
          description: Whether reader feedback gathering is enabled.
      required:
        - enabled
    GitSyncSiteCustomizationAI:
      type: object
      description: |
        AI assistant settings.
      properties:
        mode:
          $ref: "#/components/schemas/CustomizationAIMode"
        suggestions:
          $ref: "#/components/schemas/CustomizationSuggestedQuestions"
      required:
        - mode
    GitSyncSiteCustomizationPageActions:
      type: array
      description: |
        Ordered page-level action buttons exposed in the published site's page menu.
      uniqueItems: true
      items:
        $ref: "#/components/schemas/CustomizationPageActionType"
    GitSyncSiteCustomizationExternalLinks:
      type: object
      description: |
        External link behavior.
      properties:
        target:
          $ref: "#/components/schemas/SiteExternalLinksTarget"
      required:
        - target
    GitSyncSiteCustomizationPagination:
      type: object
      description: |
        Pagination navigation settings.
      properties:
        enabled:
          type: boolean
          description: Whether the prev/next pagination navigation is shown on pages.
      required:
        - enabled
    GitSyncSiteCustomizationPrivacyPolicy:
      type: object
      description: |
        Privacy policy link shown on the published site.
      properties:
        url:
          $ref: "#/components/schemas/URL"
    GitSyncSiteCustomizationSocialPreview:
      type: object
      description: |
        Social preview asset.
      properties:
        url:
          description: |
            Reserved repository asset path for the social preview image:
            `.gitbook/assets/social-preview.<ext>`, where `<ext>` is the
            image's file extension (e.g. `png`, `jpg`). Any other filename is
            rejected.
          $ref: "#/components/schemas/GitSyncSiteCustomizationAssetPath"
    GitSyncSiteCustomizationSocialAccount:
      type: object
      description: |
        A single social account entry.
      properties:
        platform:
          $ref: "#/components/schemas/SiteSocialAccountPlatform"
        handle:
          $ref: "#/components/schemas/SiteSocialAccountHandle"
        display:
          type: object
          properties:
            footer:
              type: boolean
            header:
              type: boolean
          required:
            - footer
            - header
      required:
        - platform
        - handle
        - display
    GitSyncSiteCustomizationInsights:
      type: object
      description: |
        Visitor insights settings.
      properties:
        trackingCookie:
          type: boolean
          description: Whether GitBook identifies visitors on the site using a cookie.
      required:
        - trackingCookie
    GitSyncSiteCustomization:
      type: object
      description: |
        Customization settings for the published site, authored in `docs.yaml`.

        Every top-level field is optional — a Git Sync YAML is a **sparse override** of
        the live customization. Fields you don't include stay at whatever the site
        has as default.

        Custom fonts referenced from `styling.font` / `styling.monospaceFont` must
        have a matching definition under `site.fonts[]`.
      properties:
        publishedTitle:
          description: Title to use for the published site. If omitted, falls back to the default site title.
          $ref: "#/components/schemas/SiteTitle"
        localizedPublishedTitles:
          description: Localized titles for the published site, keyed by locale.
          $ref: "#/components/schemas/LocalizedString128"
        styling:
          $ref: "#/components/schemas/GitSyncSiteCustomizationStyling"
        favicon:
          $ref: "#/components/schemas/GitSyncSiteCustomizationFavicon"
        header:
          $ref: "#/components/schemas/GitSyncSiteCustomizationHeader"
        footer:
          $ref: "#/components/schemas/GitSyncSiteCustomizationFooter"
        announcement:
          $ref: "#/components/schemas/GitSyncSiteCustomizationAnnouncement"
        themeModes:
          $ref: "#/components/schemas/GitSyncSiteCustomizationThemeModes"
        feedback:
          $ref: "#/components/schemas/GitSyncSiteCustomizationFeedback"
        ai:
          $ref: "#/components/schemas/GitSyncSiteCustomizationAI"
        pageActions:
          $ref: "#/components/schemas/GitSyncSiteCustomizationPageActions"
        externalLinks:
          $ref: "#/components/schemas/GitSyncSiteCustomizationExternalLinks"
        pagination:
          $ref: "#/components/schemas/GitSyncSiteCustomizationPagination"
        privacyPolicy:
          $ref: "#/components/schemas/GitSyncSiteCustomizationPrivacyPolicy"
        socialPreview:
          $ref: "#/components/schemas/GitSyncSiteCustomizationSocialPreview"
        socialAccounts:
          type: array
          description: Social accounts to surface on the site.
          items:
            $ref: "#/components/schemas/GitSyncSiteCustomizationSocialAccount"
          maxItems: 10
        insights:
          $ref: "#/components/schemas/GitSyncSiteCustomizationInsights"
    GitSyncSiteConfig:
      type: object
      description: |
        Schema for a site `docs.yaml` file — the canonical contract for what
        can be authored in Git Sync to drive a site's customization and structure.
      properties:
        version:
          type: integer
          description: |
            Reserved for future use. When a breaking schema change ships, this
            field lets the parser branch on the version; absence means v1.
          enum:
            - 1
          default: 1
        site:
          type: object
          additionalProperties: false
          properties:
            title:
              type: string
              description: Display title for the site.
              minLength: 1
            structure:
              $ref: "#/components/schemas/GitSyncSiteStructure"
            fonts:
              type: array
              description: Custom font definitions referenced from `site.customization.styling`.
              items:
                $ref: "#/components/schemas/GitSyncSiteCustomizationFontDefinition"
            customization:
              $ref: "#/components/schemas/GitSyncSiteCustomization"
          required:
            - title
            - structure
      required:
        - site
    IntegrationEnvironmentSpaceInstallation:
      allOf:
        - $ref: "#/components/schemas/IntegrationContentInstallationBase"
        - type: object
          properties:
            space:
              description: The space the integration is installed on.
              type: string
          required:
            - space
    IntegrationEnvironmentSiteInstallation:
      allOf:
        - $ref: "#/components/schemas/IntegrationContentInstallationBase"
        - type: object
          properties:
            site:
              description: The site the integration is installed on.
              type: string
          required:
            - site
    IntegrationEnvironment:
      type: object
      description: Runtime environment provided during the execution of integration's code.
      properties:
        authToken:
          type: string
          description: Authentication token to use with the HTTP API. Depending on the context, the token might be representing the installation or the integration.
          deprecated: true
        integration:
          $ref: "#/components/schemas/Integration"
        installation:
          $ref: "#/components/schemas/IntegrationInstallation"
        spaceInstallation:
          $ref: "#/components/schemas/IntegrationEnvironmentSpaceInstallation"
        siteInstallation:
          $ref: "#/components/schemas/IntegrationEnvironmentSiteInstallation"
        secrets:
          $ref: "#/components/schemas/IntegrationSecrets"
        signingSecret:
          type: string
          description: Secret that can be used to verify the authenticity of incoming HTTP requests to the integration.
          deprecated: true
        signingSecrets:
          type: object
          properties:
            integration:
              type: string
              description: Secret that can be used to verify the authenticity of incoming HTTP requests to the integration.
            installation:
              type: string
              description: Secret that can be used to verify the authenticity of incoming HTTP requests to the installation.
            spaceInstallation:
              type: string
              description: Secret that can be used to verify the authenticity of incoming HTTP requests to the space installation.
            siteInstallation:
              type: string
              description: Secret that can be used to verify the authenticity of incoming HTTP requests to the site installation.
          required:
            - integration
        apiEndpoint:
          type: string
          description: URL of the HTTP API
        apiTokens:
          type: object
          properties:
            integration:
              type: string
              description: API authentication token representing the integration.
            installation:
              type: string
              description: API authentication token representing the current installation.
          required:
            - integration
        network:
          $ref: "#/components/schemas/IntegrationNetwork"
          description: Network configuration for the integration environment
      required:
        - apiEndpoint
        - apiTokens
        - integration
        - signingSecrets
        - secrets
    SpaceIntegrationScript:
      type: object
      properties:
        script:
          description: Script URL to load.
          $ref: "#/components/schemas/URL"
        contentSecurityPolicy:
          description: Content Security Policy to secure the loading of this script.
          type: string
        cookies:
          type: boolean
          description: If true, the script will potentially load use cookies and visitors should be aware.
      required:
        - script
        - cookies
