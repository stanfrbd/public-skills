                  type: array
                  minItems: 1
                  maxItems: 50
                  items:
                    $ref: "#/components/schemas/ChangeRequestContentChange"
      responses:
        "200":
          description: The change request has been updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeRequest"
        "404":
          description: The change request could not be found.
