    SubscriptionChanges:
      type: object
      description: Changes to apply during a subscription upgrade or downgrade
      properties:
        removeMembers:
          description: A list of member identifiers to be removed
          type: array
          items:
            type: string
        updateSites:
          description: |
            A list of site updates to be applied before upgrading.  If a site is not present in this list, it'll be upgraded to whichever type matches its features and its published status will be unchanged. When downgrading to a lower type all relevant paid features will be disabled before applying the new type.
          type: array
          items:
            oneOf:
              - type: object
                properties:
                  id:
                    description: The site identifier
                    type: string
                  type:
                    description: The site type to migrate to
                    $ref: "#/components/schemas/SiteType"
                additionalProperties: false
                required:
                  - id
                  - type
              - type: object
                properties:
                  id:
                    description: The site identifier
                    type: string
                  isPublished:
                    description: Can be set to `false` or `true` to either unpublish or publish a site
                    type: boolean
                additionalProperties: false
                required:
                  - id
                  - isPublished
              - type: object
                properties:
                  id:
                    description: The site identifier
                    type: string
                  type:
                    description: The site type to migrate to
                    $ref: "#/components/schemas/SiteType"
                  isPublished:
                    description: Can be set to `false` or `true` to either unpublish or publish a site
                    type: boolean
                additionalProperties: false
                required:
                  - id
                  - type
                  - isPublished
      required:
        - removeMembers
        - updateSites
    BillingCoupon:
      type: string
