      minLength: 1
      maxLength: 500
    BillingMeter:
      type: string
      description: Identifier of a billing meter
      enum:
        - ai_responses
        - ai_agent_responses
        - translation_words
    UpgradeOrganizationBilling:
      type: object
      properties:
        product:
          $ref: "#/components/schemas/BillingProduct"
        interval:
          $ref: "#/components/schemas/BillingInterval"
        changes:
          $ref: "#/components/schemas/SubscriptionChanges"
        reason:
          type: string
          description: Reason that triggered the billing upgrade
        coupon:
          $ref: "#/components/schemas/BillingCoupon"
          description: Coupon or promotion code to apply to the subscription
        addons:
          type: array
          description: |
            Optional usage addons to apply when upgrading: - if set, apply provided billable addons (non-billable meters are ignored) - if omitted, keep current subscription addons (or billing addons for new subs) - if omitted during interval switch, keep addon selection and switch addon price interval - if empty, or all provided meters are ignored, remove all existing billable addons
          items:
            $ref: "#/components/schemas/BillingMeter"
        mode:
          type: string
          description: |
            Mode to use for the upgrade (default value is `commit`): - `commit`: a checkout session is returned or the upgrade is applied directly - `preview`: a preview invoice is always returned
          enum:
            - commit
            - preview
      required:
        - product
        - interval
    BillingInvoicePreview:
      type: object
      properties:
        amount:
          description: Final total owed for this invoice after discounts and credits.
          type: number
        subtotal:
          description: Sum of invoice line items before discounts and credits are applied.
          type: number
        amountDueToday:
          description: Remaining unpaid amount on this invoice, what would be charged now.
          type: number
        customerBalance:
          description: Current balance, if any, being stored on the customer. If positive, the customer has credit to apply to their next invoice.
          type: number
        remainingCustomerBalance:
          description: Current balance after potential upgrade.
          type: number
        lines:
          type: array
          description: Details of the change happening on the subscription.
          items:
            type: object
            properties:
              description:
                type: string
              amount:
                type: number
              periodStart:
                $ref: "#/components/schemas/Timestamp"
              periodEnd:
                $ref: "#/components/schemas/Timestamp"
            required:
              - amount
              - description
              - periodStart
              - periodEnd
        discounts:
          type: array
          description: Discounts applied to the subscription.
          items:
            type: object
            properties:
              description:
                description: The description of the applied discount.
                type: string
              amount:
                description: The amount of the applied discount.
                type: number
            required:
              - amount
              - description
      required:
        - subtotal
        - amount
        - amountDueToday
        - customerBalance
        - remainingCustomerBalance
        - lines
