        - active
        - past_due
        - incomplete_expired
        - canceled
        - unpaid
        - paused
    APIIntegrationScope:
      type: string
      enum:
        - integration:read
        - integration:update
        - integration:installation:read
        - integration:installation:update
    APIScope:
      anyOf:
