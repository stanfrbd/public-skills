      properties:
        type:
          type: string
          enum:
            - response_finish
        messageId:
          type: string
          description: |
            The ID of the message that this event is composing.
        responseId:
          type: string
          deprecated: true
          description: The ID of the response
        response:
          description: The response metadata associated with the message.
          $ref: "#/components/schemas/AIMessageResponseMetadata"
      required:
        - type
        - messageId
        - response
