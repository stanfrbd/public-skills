                      oneOf:
                        - $ref: "#/components/schemas/CustomizationDepth"
                        - type: "null"
                    links:
                      description: The style for links to use. Set to null to reset the override.
                      oneOf:
                        - $ref: "#/components/schemas/CustomizationLinksStyle"
