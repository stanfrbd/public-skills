        id:
          type: string
        status:
          $ref: "#/components/schemas/IntegrationInstallationStatus"
        space_selection:
          $ref: "#/components/schemas/IntegrationInstallationSpaceSelection"
        site_selection:
          $ref: "#/components/schemas/IntegrationInstallationSiteSelection"
        spaces:
          type: number
