          $ref: "#/components/schemas/CustomizationAnnouncement"
        themes:
          description: |
            Customization options for the dark/light theme modes.
          type: object
          properties:
            default:
              $ref: "#/components/schemas/CustomizationDefaultThemeMode"
            toggeable:
              description: Should the reader be able to switch between dark and light mode
              type: boolean
          required:
            - default
            - toggeable
        feedback:
          type: object
          properties:
            enabled:
              type: boolean
              description: If true, feedback gathering is enabled
          required:
            - enabled
        ai:
          type: object
          properties:
            mode:
              $ref: "#/components/schemas/CustomizationAIMode"
            suggestions:
              $ref: "#/components/schemas/CustomizationSuggestedQuestions"
          required:
            - mode
        advancedCustomization:
          type: object
          properties:
            enabled:
              type: boolean
              description: If true, Advanced customization is enabled
          required:
            - enabled
        pageActions:
          type: object
          properties:
            items:
              type: array
              description: |
                Ordered list of the page actions enabled in the page menu. This is the source of truth for
                which actions are enabled and in which order: the position defines the display order, the
                first action is the default one, surfaced as the main button on the page, and actions not
                present in the list are disabled. An empty list turns the page menu off entirely: no action
                is shown, not even the `assistant`. On a non-empty list the `assistant` action follows the
                `ai.mode` setting rather than its own presence: it is kept (prepended by default if missing,
                otherwise keeping its position) when the assistant is enabled and absent when it is disabled.
                When the menu is off, the assistant stays reachable from the header via `ai.mode`.
              items:
                $ref: "#/components/schemas/CustomizationPageActionType"
          required:
            - items
        externalLinks:
          type: object
          properties:
            target:
              $ref: "#/components/schemas/SiteExternalLinksTarget"
          required:
            - target
        pagination:
          type: object
          properties:
            enabled:
              type: boolean
              description: Whether the pagination navigation should be displayed on pages.
          required:
            - enabled
        trademark:
          type: object
          properties:
            enabled:
              type: boolean
              description: Whether the GitBook trademark ("Powered by GitBook") should be visible
          required:
            - enabled
        privacyPolicy:
          type: object
          properties:
            url:
              $ref: "#/components/schemas/URL"
        socialPreview:
          type: object
          properties:
            url:
              $ref: "#/components/schemas/URL"
        socialAccounts:
          $ref: "#/components/schemas/SiteSocialAccounts"
        insights:
          type: object
          properties:
            trackingCookie:
              type: boolean
              description: Whether GitBook identifies the visitor on the site using a cookie.
              default: true
          required:
            - trackingCookie
      required:
        - styling
        - internationalization
        - favicon
        - header
        - footer
        - themes
        - feedback
        - ai
        - advancedCustomization
        - trademark
        - externalLinks
        - pagination
        - pageActions
        - privacyPolicy
        - socialPreview
        - socialAccounts
        - insights
    SiteCustomizationSettings:
