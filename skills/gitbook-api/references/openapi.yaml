                      oneOf:
                        - $ref: "#/components/schemas/CustomizationTint"
                        - type: "null"
                    corners:
                      description: The style of the corners to use. Set to null to reset the override.
                      oneOf:
                        - $ref: "#/components/schemas/CustomizationCorners"
                        - type: "null"
                    depth:
