        type:
          type: string
          enum:
            - response_document
            - response_reasoning
        messageId:
          type: string
          description: |
            The ID of the message that this event is composing.
        stepIndex:
          type: integer
          description: |
            The index of the step of the message that this event is composing.
        operation:
          type: string
          enum:
            - insert
            - update
        blocks:
          type: array
          items:
            $ref: "#/components/schemas/DocumentBlocksTopLevels"
